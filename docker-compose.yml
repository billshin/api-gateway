services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "8081:8080"
      - "9100:9100"


    volumes:
      - /home/billshin/docker/api-monitor/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /home/billshin/docker/api-monitor/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - monitoring  
    restart: always
    
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /home/billshin/docker/api-monitor/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - monitoring
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring      
    restart: always

networks:
  monitoring:
    driver: bridge
    
volumes:
  grafana-data: